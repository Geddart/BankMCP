<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bank MCP — OAuth Callback</title>
<meta name="robots" content="noindex">
<style>
body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #111; }
h1 { font-size: 1.4em; }
code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; word-break: break-all; }
.note { color: #666; font-size: 0.9em; margin-top: 30px; }
</style>
</head>
<body>
<h1>OAuth callback received.</h1>
<p>Your local Bank MCP setup tool has captured the authorization code from the URL bar above.</p>
<p>You can close this tab.</p>
<p class="note">If the setup tool reports an error, copy the full URL from your browser bar and paste it back into the terminal.</p>
<script>
// Display the captured code (informational only — the local tool reads it from the URL).
const params = new URLSearchParams(window.location.search);
if (params.has("code")) {
  const c = params.get("code");
  document.body.innerHTML += "<p><strong>code:</strong> <code>" + c.substring(0, 12) + "...</code></p>";
}
</script>
</body>
</html>
